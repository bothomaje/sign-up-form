<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles.css" rel="stylesheet">
    <title>Sign-up Form</title>
</head>
<body>
    <div class="page-container">
        <div class="image-container">
            <div class="logo">
                <img src="assets/images/odin-lined.png" alt="Odin Logo">
                <h1>Odin</h1>
            </div>
            <div class="credit">Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a></div>
        </div>
        <div class="form-container">
            <div class="form-text">
                <p class="main-text">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <span class="italic">now</span> to get started.</p>
                <p class="main-text">You <span class="italic">know</span> you want to.</p>
            </div>
            <form class="form" action="" method="get">
                <fieldset class="fields">
                    <legend class="main-text legend">Let's do this!</legend>
                    <div class="field">
                        <label for="first_name">First Name</label>
                        <input id="first_name" name="first_name" type="text">
                    </div>
                    <div class="field">
                        <label for="last_name">Last Name</label>
                        <input id="last_name" name="last_name" type="text">
                    </div>
                    <div class="field">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email">
                    </div>
                    <div class="field">
                        <label for="phone">Phone Number</label>
                        <input id="phone" name="phone" type="tel">
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password">
                    </div>
                    <div class="field">
                        <label for="confirm_password">Confirm Password</label>
                        <input id="confirm_password" name="confirm_password" type="password">
                    </div>
                </fieldset>
                <button class="create-account" type="submit">Create Account</button>
                <div class="login">
                    Already have an account? <a href="#">Log in</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
